<!DOCTYPE html>
<html xmlns:h="http://xmlns.jcp.org/jsf/html" xmlns:composite="http://xmlns.jcp.org/jsf/composite">
<h:body>
  <composite:interface>
    <composite:attribute name="label" required="true" />
    <composite:attribute name="type" type="com.eronalves.ButtonType" default="SUCCESS" />
  </composite:interface>
  <composite:implementation>
    <style>
      .gds_button {
        padding: 0.7rem;
        font-weight: 600;
        border-radius: 5px;
      }

      .gds_button_success {
        background-color: green;
        color: white;
      }
    </style>
    <h:button value="#{cc.attrs.label}" styleClass="gds_button gds_button_#{cc.attrs.type.toString().toLowerCase()}" />
  </composite:implementation>
</h:body>

</html>
